{# Inline warning chip for a published version that still carries GPS.
   Quarantined versions get a separate "Awaiting review" badge — suppress
   the chip there to keep the row uncluttered. #}
{% if version and version.has_gps and not version.is_quarantined %}
<span class="gps-warning" title="This version contains GPS / location metadata"
      aria-label="Contains GPS / location metadata">
    <i data-lucide="map-pin" class="w-3 h-3" aria-hidden="true"></i>
</span>
{% endif %}
