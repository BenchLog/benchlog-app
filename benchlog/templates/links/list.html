{% extends "base.html" %}

{% block title %}Links — {{ project.title }} — BenchLog{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    {% include "components/_project_header.html" %}

    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-900">External Links</h2>
    </div>

    <!-- Add link form -->
    <div class="rounded-lg border border-gray-200 bg-white p-4 mb-6" x-data="{ open: false }">
        <button @click="open = !open" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">+ Add Link</button>
        <form x-show="open" method="post" action="/projects/{{ project.slug }}/links"
              hx-post="/projects/{{ project.slug }}/links" hx-target="#link-list" hx-swap="innerHTML"
              class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Title</label>
                <input type="text" name="title" required placeholder="GitHub Repo"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">URL</label>
                <input type="url" name="url" required placeholder="https://..."
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Type</label>
                <select name="link_type"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    {% for lt in link_types %}
                    <option value="{{ lt }}">{{ lt | replace('_', ' ') | title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="sm:col-span-3">
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">Add</button>
            </div>
        </form>
    </div>

    <div id="link-list">
        {% include "links/_link_list.html" %}
    </div>
</div>
{% endblock %}
