<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Concept 35B: Flat-lay open notebook with structured page layout
       Same spread as 35, but the content is a blocky wireframe of a
       real project-journal entry: title, sketch/diagram box, notes,
       bullets, a date stamp. The layout itself signals "structured
       log of work" rather than "abstract doodle." -->

  <!-- Subtle shadow under spread -->
  <rect x="12" y="22" width="76" height="64" rx="3" fill="#E3D7BD" opacity="0.55"/>

  <!-- Left page -->
  <path d="M10 20 Q10 18 12 18 L50 18 L50 84 L12 84 Q10 84 10 82 Z"
        fill="#F4EDE0" stroke="#D8CDB5" stroke-width="1.5"/>

  <!-- Right page -->
  <path d="M50 18 L88 18 Q90 18 90 20 L90 82 Q90 84 88 84 L50 84 Z"
        fill="#EBE1CF" stroke="#D8CDB5" stroke-width="1.5"/>

  <!-- Center fold / gutter -->
  <line x1="50" y1="18" x2="50" y2="84" stroke="#C9BD9F" stroke-width="1"/>

  <!-- ======= LEFT PAGE content ======= -->
  <!-- Title bar (solid) -->
  <rect x="14" y="26" width="22" height="3" rx="0.5" fill="#7A3214"/>
  <!-- Under-rule -->
  <line x1="14" y1="33" x2="46" y2="33" stroke="#7A3214" stroke-width="0.7" opacity="0.55"/>

  <!-- Sketch / diagram box -->
  <rect x="14" y="38" width="30" height="20" rx="1" fill="none" stroke="#7A3214" stroke-width="1.5"/>
  <!-- Tiny detail inside box suggesting a diagram -->
  <line x1="19" y1="48" x2="28" y2="48" stroke="#7A3214" stroke-width="1" opacity="0.8"/>
  <circle cx="33" cy="48" r="1.4" fill="none" stroke="#7A3214" stroke-width="1"/>

  <!-- Notes lines -->
  <rect x="14" y="64" width="28" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>
  <rect x="14" y="69" width="32" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>
  <rect x="14" y="74" width="18" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <!-- ======= RIGHT PAGE content ======= -->
  <!-- Small title bar -->
  <rect x="54" y="26" width="14" height="3" rx="0.5" fill="#7A3214"/>

  <!-- Date stamp (top-right, mono-style tick marks) -->
  <rect x="78" y="26" width="8" height="1.6" rx="0.3" fill="#7A3214" opacity="0.6"/>
  <rect x="78" y="29" width="5" height="1.6" rx="0.3" fill="#7A3214" opacity="0.6"/>

  <!-- Bullet list -->
  <circle cx="56" cy="38" r="1.2" fill="#7A3214"/>
  <rect x="60" y="37.2" width="22" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <circle cx="56" cy="43" r="1.2" fill="#7A3214"/>
  <rect x="60" y="42.2" width="18" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <circle cx="56" cy="48" r="1.2" fill="#7A3214"/>
  <rect x="60" y="47.2" width="24" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <!-- Checkbox (done) -->
  <rect x="54.5" y="55" width="3" height="3" rx="0.4" fill="#7A3214"/>
  <path d="M55.3 56.5 L56.3 57.3 L57.2 55.8" fill="none" stroke="#F4EDE0" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="60" y="55.7" width="20" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <!-- Checkbox (empty) -->
  <rect x="54.5" y="60" width="3" height="3" rx="0.4" fill="none" stroke="#7A3214" stroke-width="0.8"/>
  <rect x="60" y="60.7" width="16" height="1.6" rx="0.5" fill="#7A3214" opacity="0.55"/>

  <!-- Small secondary block (photo/snippet) at bottom -->
  <rect x="54" y="68" width="18" height="10" rx="1" fill="#7A3214" opacity="0.18" stroke="#7A3214" stroke-width="0.8"/>
  <!-- Mono code line next to it -->
  <rect x="75" y="70" width="10" height="1.4" rx="0.3" fill="#7A3214" opacity="0.55"/>
  <rect x="75" y="73" width="8" height="1.4" rx="0.3" fill="#7A3214" opacity="0.55"/>
  <rect x="75" y="76" width="11" height="1.4" rx="0.3" fill="#7A3214" opacity="0.55"/>
</svg>
