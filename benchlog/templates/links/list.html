{% extends "base.html" %}

{% block title %}Links — {{ project.title }} — BenchLog{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
        <a href="/projects/{{ project.slug }}" class="hover:text-gray-700">{{ project.title }}</a>
        <span>/</span>
        <span class="text-gray-900 font-medium">Links</span>
    </div>

    <nav class="flex gap-4 border-b border-gray-200 mb-6">
        <a href="/projects/{{ project.slug }}" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Overview</a>
        <a href="/projects/{{ project.slug }}/files" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Files</a>
        <a href="/projects/{{ project.slug }}/updates" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Updates</a>
        <a href="/projects/{{ project.slug }}/bom" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">BOM</a>
        <a href="/projects/{{ project.slug }}/links" class="border-b-2 border-indigo-500 px-1 pb-2 text-sm font-medium text-indigo-600">Links</a>
    </nav>

    <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-bold text-gray-900">External Links</h1>
    </div>

    <!-- Add link form -->
    <div class="rounded-lg border border-gray-200 bg-white p-4 mb-6" x-data="{ open: false }">
        <button @click="open = !open" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">+ Add Link</button>
        <form x-show="open" method="post" action="/projects/{{ project.slug }}/links"
              hx-post="/projects/{{ project.slug }}/links" hx-target="#link-list" hx-swap="innerHTML"
              class="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3" @htmx:after-request="if(event.detail.successful) this.reset()">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Title</label>
                <input type="text" name="title" required placeholder="GitHub Repo"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">URL</label>
                <input type="url" name="url" required placeholder="https://..."
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Type</label>
                <select name="link_type"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    {% for lt in link_types %}
                    <option value="{{ lt }}">{{ lt | replace('_', ' ') | title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="sm:col-span-3">
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">Add</button>
            </div>
        </form>
    </div>

    <div id="link-list">
        {% include "links/_link_list.html" %}
    </div>
</div>
{% endblock %}
