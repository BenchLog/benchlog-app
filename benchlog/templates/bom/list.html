{% extends "base.html" %}

{% block title %}BOM — {{ project.title }} — BenchLog{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="flex items-center gap-2 text-sm text-gray-500 mb-1">
        <a href="/projects/{{ project.slug }}" class="hover:text-gray-700">{{ project.title }}</a>
        <span>/</span>
        <span class="text-gray-900 font-medium">Bill of Materials</span>
    </div>

    <nav class="flex gap-4 border-b border-gray-200 mb-6">
        <a href="/projects/{{ project.slug }}" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Overview</a>
        <a href="/projects/{{ project.slug }}/files" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Files</a>
        <a href="/projects/{{ project.slug }}/updates" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Updates</a>
        <a href="/projects/{{ project.slug }}/bom" class="border-b-2 border-indigo-500 px-1 pb-2 text-sm font-medium text-indigo-600">BOM</a>
        <a href="/projects/{{ project.slug }}/links" class="border-b-2 border-transparent px-1 pb-2 text-sm text-gray-500 hover:border-gray-300 hover:text-gray-700">Links</a>
    </nav>

    <h1 class="text-xl font-bold text-gray-900 mb-4">Bill of Materials</h1>

    <!-- Add item form -->
    <div class="rounded-lg border border-gray-200 bg-white p-4 mb-6" x-data="{ open: false }">
        <button @click="open = !open" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">+ Add Item</button>
        <form x-show="open" method="post" action="/projects/{{ project.slug }}/bom"
              hx-post="/projects/{{ project.slug }}/bom" hx-target="#bom-table" hx-swap="innerHTML"
              class="mt-4 grid grid-cols-2 sm:grid-cols-4 gap-3" @htmx:after-request="if(event.detail.successful) this.reset()">
            <div class="col-span-2">
                <label class="block text-xs text-gray-500 mb-1">Name</label>
                <input type="text" name="name" required placeholder="M3x8 Socket Head Cap Screw"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Qty</label>
                <input type="number" name="quantity" value="1" step="any" min="0"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Unit</label>
                <input type="text" name="unit" placeholder="pcs"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Category</label>
                <input type="text" name="category" placeholder="fasteners"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Price</label>
                <input type="number" name="price" step="0.01" min="0" placeholder="0.00"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-gray-500 mb-1">Supplier URL</label>
                <input type="url" name="supplier_url" placeholder="https://..."
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div class="col-span-2 sm:col-span-4">
                <label class="block text-xs text-gray-500 mb-1">Notes</label>
                <input type="text" name="notes" placeholder="Optional notes"
                    class="w-full rounded-md border border-gray-300 px-3 py-1.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            </div>
            <div class="col-span-2 sm:col-span-4">
                <button type="submit" class="rounded-md bg-indigo-600 px-4 py-1.5 text-sm font-medium text-white hover:bg-indigo-500">Add</button>
            </div>
        </form>
    </div>

    <div id="bom-table">
        {% include "bom/_table.html" %}
    </div>
</div>
{% endblock %}
