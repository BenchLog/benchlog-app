{% extends "base.html" %}
{% block title %}Resend verification{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto">
    <h1 class="text-3xl mb-1">Resend verification</h1>
    <p class="meta mb-6">We'll email you a fresh link</p>

    <form method="post" action="/auth/resend" class="space-y-3">
        {% include "components/_csrf.html" %}
        <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <button type="submit" class="btn-primary w-full">Send verification link</button>
    </form>

    <div class="mt-4 text-sm">
        <a href="/login">Back to sign in</a>
    </div>
</div>
{% endblock %}
