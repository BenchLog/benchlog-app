{% if tags %}
<div class="space-y-2">
    {% for tag in tags %}
    <div class="flex items-center justify-between rounded-md border border-gray-200 bg-white px-4 py-3"
         x-data="{ editing: false }">
        <div x-show="!editing" class="flex items-center gap-3">
            <span class="inline-block h-4 w-4 rounded-full" style="background-color: {{ tag.color or '#9ca3af' }};"></span>
            <span class="text-sm font-medium text-gray-900">{{ tag.name }}</span>
            <span class="text-xs text-gray-400">/tags/{{ tag.slug }}</span>
        </div>

        <form x-show="editing" method="post" action="/tags/{{ tag.id }}/edit"
              hx-post="/tags/{{ tag.id }}/edit" hx-target="#tag-list" hx-swap="innerHTML"
              class="flex items-center gap-2 flex-1">
            <input type="text" name="name" value="{{ tag.name }}" required
                class="flex-1 rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500">
            <input type="color" name="color" value="{{ tag.color or '#9ca3af' }}"
                class="h-8 w-8 rounded border border-gray-300 cursor-pointer">
            <button type="submit" class="text-sm text-indigo-600 hover:text-indigo-500">Save</button>
            <button type="button" @click="editing = false" class="text-sm text-gray-500 hover:text-gray-700">Cancel</button>
        </form>

        <div x-show="!editing" class="flex items-center gap-2">
            <button @click="editing = true" class="text-sm text-gray-500 hover:text-gray-700">Edit</button>
            <form method="post" action="/tags/{{ tag.id }}/delete"
                  hx-post="/tags/{{ tag.id }}/delete" hx-target="#tag-list" hx-swap="innerHTML"
                  hx-confirm="Delete this tag?">
                <button type="submit" class="text-sm text-red-500 hover:text-red-700">Delete</button>
            </form>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-center text-gray-400 py-8">No tags yet. Create one above.</p>
{% endif %}
