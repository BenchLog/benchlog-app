<div class="group overflow-hidden rounded-lg border border-gray-200 bg-white shadow-sm hover:shadow-md transition-shadow"
     id="project-card-{{ project.slug }}">
    {% if project.cover_image_id %}
    <a href="/projects/{{ project.slug }}">
        <div class="aspect-video bg-gray-100 overflow-hidden">
            <img src="/images/{{ project.cover_image_id }}/view" alt="{{ project.title }}" class="h-full w-full object-contain">
        </div>
    </a>
    {% else %}
    <a href="/projects/{{ project.slug }}">
        <div class="aspect-video bg-gradient-to-br from-gray-100 to-gray-200"></div>
    </a>
    {% endif %}
    <div class="p-4">
        <div class="flex items-center justify-between mb-1">
            <div class="flex items-center gap-2">
                <div x-data="{ open: false }" class="relative">
                    <button @click="open = !open"
                        class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium cursor-pointer
                        {% if project.status.value == 'idea' %}bg-yellow-100 text-yellow-800
                        {% elif project.status.value == 'in_progress' %}bg-blue-100 text-blue-800
                        {% elif project.status.value == 'completed' %}bg-green-100 text-green-800
                        {% else %}bg-gray-100 text-gray-800{% endif %}">
                        {{ project.status.value | replace('_', ' ') | title }}
                    </button>
                    <div x-show="open" @click.away="open = false"
                        class="absolute z-10 mt-1 w-36 rounded-md bg-white shadow-lg ring-1 ring-black/5">
                        {% for s in ['idea', 'in_progress', 'completed', 'archived'] %}
                        <form method="post" action="/projects/{{ project.slug }}/status"
                              hx-post="/projects/{{ project.slug }}/status"
                              hx-target="#project-card-{{ project.slug }}"
                              hx-swap="outerHTML">
                            <input type="hidden" name="status" value="{{ s }}">
                            <button type="submit" @click="open = false"
                                class="block w-full px-3 py-1.5 text-left text-xs hover:bg-gray-50
                                {{ 'font-medium' if project.status.value == s else '' }}">
                                {{ s | replace('_', ' ') | title }}
                            </button>
                        </form>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <form method="post" action="/projects/{{ project.slug }}/pin"
                  hx-post="/projects/{{ project.slug }}/pin"
                  hx-target="#project-card-{{ project.slug }}"
                  hx-swap="outerHTML">
                <button type="submit" class="text-sm {{ 'text-amber-500' if project.pinned else 'text-gray-300 hover:text-amber-400' }}" title="{{ 'Unpin' if project.pinned else 'Pin' }}">
                    &#9733;
                </button>
            </form>
        </div>
        <a href="/projects/{{ project.slug }}" class="block">
            <h3 class="font-semibold text-gray-900 group-hover:text-indigo-600">{{ project.title }}</h3>
        </a>
        {% if project.tags %}
        <div class="mt-2 flex flex-wrap gap-1">
            {% for tag in project.tags %}
            <span class="inline-flex items-center rounded-full bg-gray-100 px-2 py-0.5 text-xs text-gray-600"
                {% if tag.color %}style="background-color: {{ tag.color }}20; color: {{ tag.color }};"{% endif %}>
                {{ tag.name }}
            </span>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</div>
